<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container mt-4">
    <h3 class="mb-3">Danh sách nhân viên</h3>

    <form method="get" th:action="@{/}" class="form-inline mb-3">
        <input type="text" name="keyword" class="form-control mr-2"
               placeholder="Search name" th:value="${keyword}">

        <select name="departmentId" class="form-control mr-2">
            <option value="">All Department</option>
            <option th:each="d : ${departments}"
                    th:value="${d.id}"
                    th:selected="${d.id == departmentId}"
                    th:text="${d.name}">
            </option>
        </select>

        <input type="number" name="minAge" class="form-control mr-2" placeholder="Min age" th:value="${minAge}">
        <input type="number" name="maxAge" class="form-control mr-2" placeholder="Max age" th:value="${maxAge}">

        <button type="submit" >Search</button>
    </form>


    <div class="mb-3">
        <a class="btn btn-outline-primary mr-2"
           th:href="@{/(sortField='name', sortDir=${sortDir == 'asc' ? 'desc' : 'asc'})}">
            Sort Name
        </a>

        <a class="btn btn-outline-primary mr-2"
           th:href="@{/(sortField='age', sortDir=${sortDir == 'asc' ? 'desc' : 'asc'})}">
            Sort Age
        </a>
    </div>

    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Status</th>
            <th>Department</th>
            <th>Avatar</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="6" class="text-center text-danger">
                Không tìm thấy nhân viên nào
            </td>
        </tr>

        <tr th:each="e : ${employees}">
            <td th:text="${e.id}"></td>
            <td th:text="${e.name}"></td>
            <td th:text="${e.age}"></td>
            <td>
                <span th:text="${e.status}"
                      th:classappend="${e.status == 'ACTIVE'} ? 'text-success' : 'text-danger'">
                </span>
            </td>
            <td th:text="${e.department != null ? e.department.name : 'N/A'}"></td>
            <td>
                <img th:if="${e.avatar != null}"
                     th:src="@{'/uploads/' + ${e.avatar}}"
                     width="50" height="50"
                     style="object-fit: cover; border-radius: 5px;">
            </td>
        </tr>
        </tbody>
    </table>


    <nav>
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/(page=${currentPage - 1})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/(page=${i})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/(page=${currentPage + 1})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
