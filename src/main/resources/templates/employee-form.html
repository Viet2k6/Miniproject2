<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container mt-3">
    <h3>Add Employee</h3>
    <form th:action="@{/save}" method="post" enctype="multipart/form-data" th:object="${employee}">

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" th:field="*{age}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></small>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select th:field="*{status}" class="form-control">
                <option value="">-- Select Status --</option>
                <option value="ACTIVE">ACTIVE</option>
                <option value="INACTIVE">INACTIVE</option>
            </select>
            <small class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></small>
        </div>

        <div class="form-group">
            <label>Department</label>
            <select th:field="*{department.id}" class="form-control">
                <option value="">-- Select Department --</option>
                <option th:each="d : ${departments}"
                        th:value="${d.id}"
                        th:text="${d.name}">
                </option>
            </select>
            <small class="text-danger" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></small>
        </div>

        <div class="form-group">
            <label>Avatar</label>
            <input type="file" name="file" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/" class="btn btn-secondary">Back</a>
    </form>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
